

# Deployment Configuration
replicaCount: 3

image:
  repository: 292681319569.dkr.ecr.eu-west-1.amazonaws.com/eks-assignment
  pullPolicy: IfNotPresent
  tag: "latest"

# Service Account Configuration
serviceAccount:
  create: true
  automount: true
  annotations:
    description: "Service account for my-app"
  name: "my-app-sa"

resources: {}

# Service Configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "abdirahman.forum"
  hosts:
    - host: abdirahman.forum
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: abdirahman-forum-tls
      hosts:
        - abdirahman.forum
